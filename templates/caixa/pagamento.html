<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        Pagamento
    </title>

    <link
        rel="stylesheet"
        href="/static/css/caixa/pagamento.css"
    >

</head>
<body>

<section class="pagamento-container">

    <div class="pagamento-card">

        <h1>
            Finalizar Venda
        </h1>

        <div class="venda-info">

            <div class="titulo">
                <h1>Finalizar Venda</h1>
                <div class="venda-id">
                    Venda #{{ venda.id }}
                </div>
            </div>

            <div class="total-box">
                <span>Total da Venda</span>
                <h2>
                    R$ {{ "%.2f"|format(venda.total) }}
                </h2>
            </div>

        </div>

        <div class="formas">

            <label class="forma-card">
                <input type="radio"
                    name="pagamento"
                    value="Pix"
                    checked>
                <span>📱 PIX</span>
            </label>

            <label class="forma-card">
                <input type="radio"
                    name="pagamento"
                    value="Dinheiro">
                <span>💵 Dinheiro</span>
            </label>

            <label class="forma-card">
                <input type="radio"
                    name="pagamento"
                    value="Credito">
                <span>💳 Crédito</span>
            </label>

            <label class="forma-card">
                <input type="radio"
                    name="pagamento"
                    value="Debito">
                <span>🏦 Débito</span>
            </label>

        </div>

        <div id="areaPix">

            <h3>Pagamento via PIX</h3>

            <img
                src="/static/imagens/pix_teste.png"
                alt="QR Code PIX"
                class="qrcode-pix"
            >

            <p class="chave-pix">

                Chave PIX:

                <strong>
                    pix@lojafashion.com
                </strong>

            </p>

            <button
                type="button"
                class="btn-copiar-pix"
                onclick="copiarPix()"
            >
                📋 Copiar Chave PIX
            </button>

        </div>

        <div class="campo">

            <label>Valor Recebido</label>

            <input
                type="number"
                id="valorRecebido"
                placeholder="R$ 0,00"
            >



            <div class="troco-box">

                <span>Troco</span>

                <strong id="troco">
                    R$ 0,00
                </strong>

            </div>

        </div>

        <div class="campo">

            <label>Parcelamento</label>

            <select id="parcelas">

                <option>1x sem juros</option>
                <option>2x sem juros</option>
                <option>3x sem juros</option>
                <option>4x sem juros</option>
                <option>5x sem juros</option>
                <option>6x sem juros</option>
                <option>7x sem juros</option>
                <option>8x sem juros</option>
                <option>9x sem juros</option>
                <option>10x sem juros</option>

            </select>

        </div>

        <div class="acoes">

            <button
                class="btn-confirmar"
            >
                Confirmar Pagamento
            </button>

            <button
                onclick="window.close()"
                class="btn-cancelar"
            >
                Cancelar
            </button>

        </div>

    </div>

</section>

<script>

function copiarPix(){

    const chave = document
        .getElementById("chavePix")
        .innerText

    navigator.clipboard.writeText(chave)

    alert(
        "Chave PIX copiada!"
    )

}

</script>

</body>
</html>
