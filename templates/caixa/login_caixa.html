<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Caixa</title>

    <link rel="stylesheet"
          href="/static/css/caixa/login_caixa.css">

</head>
<body>

<div class="login-container">

    <div class="login-card">

        <h1>Caixa PDV</h1>

        <p>
            Faça login para abrir o caixa
        </p>

        <form action="/caixa/login"
              method="POST">

            <input
                type="text"
                name="matricula"
                placeholder="Matrícula"
                required
            >

            <input
                type="password"
                name="senha"
                placeholder="Senha"
                required
            >

            <button type="submit">

                Entrar

            </button>

        </form>

    </div>

</div>

</body>
</html>
