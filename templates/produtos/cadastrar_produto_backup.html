{% extends "base.html" %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4">
            Cadastrar Produto
        </h2>

        <form 
            action="/admin/produtos"
            method="POST"
            enctype="multipart/form-data"
        >

            <div class="mb-3">
                <label class="form-label">
                    Nome
                </label>

                <input 
                    type="text"
                    name="nome"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Descrição
                </label>

                <textarea 
                    name="descricao"
                    class="form-control"
                    rows="4"
                    required
                ></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Preço
                </label>

                <input 
                    type="number"
                    step="0.01"
                    name="preco"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Categoria
                </label>

                <input 
                    type="text"
                    name="categoria"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Estoque
                </label>

                <input 
                    type="number"
                    name="estoque"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label class="form-label">
                    Imagem do Produto
                </label>

                <input 
                    type="file"
                    name="imagem"
                    class="form-control"
                    required
                >
            </div>

            <button class="btn btn-dark w-100">
                Cadastrar Produto
            </button>

        </form>

    </div>

</div>

{% endblock %}
