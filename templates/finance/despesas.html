{% extends "admin_base.html" %}

{% block content %}

{% block extra_css %}
<link rel="stylesheet"
href="/static/css/finance/despesas.css">
{% endblock %}

<div class="dashboard-page">

    <h1>Cadastrar Despesa</h1>

    <div class="form-card">

        <form method="POST">

            <div class="form-group">

                <label>Descrição</label>

                <input
                    type="text"
                    name="descricao"
                    placeholder="Ex: Aluguel"
                    required
                >

            </div>

            <div class="form-group">

                <label>Valor</label>

                <input
                    type="number"
                    step="0.01"
                    name="valor"
                    placeholder="0.00"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn-salvar"
            >
                Salvar Despesa
            </button>

        </form>

    </div>

</div>

{% endblock %}
